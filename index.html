<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<title>MBTI Game Decision Quiz</title>

</head>

<body>

<!-- HOME -->

<div id="home" class="page">

<h2>MBTI Game Quiz</h2>

<p>คุณคิดว่าตัวเองเป็น MBTI อะไร?</p>

<input id="mbtiInput" placeholder="เช่น INFP" style="padding:10px;font-size:16px">

<br><br>

<button onclick="startQuiz()">เริ่มทำแบบทดสอบ</button>

</div>


<!-- QUESTION 1 -->

<div id="q1" class="page">

<h3>คำถามที่ 1</h3>

<p>คุณชอบเล่นเกมแบบไหน</p>

<button onclick="next('E',2)">เล่นกับเพื่อน</button>

<button onclick="next('I',2)">เล่นคนเดียว</button>

</div>


<!-- QUESTION 2 -->

<div id="q2" class="page">

<h3>คำถามที่ 2</h3>

<p>เวลาตัดสินใจในเกม</p>

<button onclick="next('T',3)">ใช้เหตุผล</button>

<button onclick="next('F',3)">ใช้ความรู้สึก</button>

</div>


<!-- QUESTION 3 -->

<div id="q3" class="page">

<h3>คำถามที่ 3</h3>

<p>วิธีเล่นเกมของคุณ</p>

<button onclick="next('J',4)">วางแผนก่อน</button>

<button onclick="next('P',4)">เล่นตามสถานการณ์</button>

</div>


<!-- QUESTION 4 -->

<div id="q4" class="page">

<h3>คำถามที่ 4</h3>

<p>คุณสนใจอะไรในเกม</p>

<button onclick="showResult('S')">ข้อมูลจริง</button>

<button onclick="showResult('N')">จินตนาการ</button>

</div>


<!-- RESULT -->

<div id="resultPage" class="page">

<h2>ผลลัพธ์ของคุณ</h2>

<div id="result"></div>

<button onclick="restart()">ทำแบบทดสอบอีกครั้ง</button>

</div>


<script>

let userMBTI = ""
let answers = []
let choices = []

function showPage(id){

document.querySelectorAll(".page").forEach(p=>{
p.style.display="none"
})

document.getElementById(id).style.display="block"

}


function startQuiz(){

userMBTI = document.getElementById("mbtiInput").value

if(userMBTI == ""){
alert("กรุณากรอก MBTI ก่อน")
return
}

showPage("q1")

}


function next(type,nextPage){

answers.push(type)

choices.push(type)

showPage("q"+nextPage)

}


function getEnding(mbti){

if(mbti=="INFP") return "Peaceful Hero"

if(mbti=="INTJ") return "Master Strategist"

if(mbti=="ENFP") return "Adventurous Spirit"

if(mbti=="ISTJ") return "Reliable Guardian"

return "Balanced Explorer"

}


function showResult(type){

answers.push(type)

choices.push(type)

let mbti = answers.join("")

let ending = getEnding(mbti)

document.getElementById("result").innerHTML =
"MBTI ของคุณคือ <b>"+mbti+"</b><br><br>Ending: <b>"+ending+"</b>"

showPage("resultPage")

sendData(mbti,ending,choices)

}


function restart(){

answers=[]

choices=[]

showPage("home")

}


function sendData(mbti,ending,choices){

fetch("https://script.google.com/macros/s/AKfycbx5jiFN-4QqZuGpEidm3N881vO_J0Mv7goyXccddrtVTkLYzgf0YcILP3-a61Ao_wBXkQ/exec",{

method:"POST",

body:JSON.stringify({

inputMBTI:userMBTI,
mbti:mbti,
ending:ending,
q1:choices[0],
q2:choices[1],
q3:choices[2],
q4:choices[3],
time:new Date().toLocaleString()

})

})

}


showPage("home")

</script>

</body>
</html>
