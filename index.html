<!DOCTYPE html>
<html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>MBTI Game Decision Quiz</title>

</head>

<body>

    <!-- HOME -->
    <div id="home" class="page">

        <h2>MBTI Game Quiz</h2>

        <p>กรอก MBTI ของคุณก่อนเริ่ม</p>

        <input id="userMBTI" placeholder="เช่น INTJ" maxlength="4" style="padding:10px;width:100%;margin-bottom:10px">

        <button onclick="checkMBTI()">เริ่มทำแบบทดสอบ</button>

        <div id="error" style="color:red;margin-top:10px"></div>

    </div>


    <!-- QUESTION 1 -->

    <div id="q1" class="page">

        <h3>คำถามที่ 1</h3>

        <p>คุณชอบเล่นเกมแบบไหน</p>

        <button onclick="next('E',2)">เล่นกับเพื่อน</button>

        <button onclick="next('I',2)">เล่นคนเดียว</button>

    </div>


    <!-- QUESTION 2 -->

    <div id="q2" class="page">

        <h3>คำถามที่ 2</h3>

        <p>เวลาตัดสินใจในเกม</p>

        <button onclick="next('T',3)">ใช้เหตุผล</button>

        <button onclick="next('F',3)">ใช้ความรู้สึก</button>

    </div>


    <!-- QUESTION 3 -->

    <div id="q3" class="page">

        <h3>คำถามที่ 3</h3>

        <p>วิธีเล่นเกมของคุณ</p>

        <button onclick="next('J',4)">วางแผนก่อน</button>

        <button onclick="next('P',4)">เล่นตามสถานการณ์</button>

    </div>


    <!-- QUESTION 4 -->

    <div id="q4" class="page">

        <h3>คำถามที่ 4</h3>

        <p>คุณสนใจอะไรในเกม</p>

        <button onclick="showResult('S')">ข้อมูลจริง</button>

        <button onclick="showResult('N')">จินตนาการ</button>

    </div>


    <!-- RESULT -->

    <div id="resultPage" class="page">

        <h2>ผลลัพธ์ของคุณ</h2>

        <div id="result"></div>

        <button onclick="restart()">ทำแบบทดสอบอีกครั้ง</button>

    </div>
    <script src="script.js"></script>
</body>

</html>
